name: Deploy dashboard to GitHub Pages

# Builds the client-side dashboard (Vite) and publishes it to GitHub Pages.
# Users visit the page and upload their own .run files — analysis runs in their
# browser, nothing is uploaded.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # base must match the repo name for project Pages (https://<user>.github.io/<repo>/).
      # Rename the repo? Update VITE_BASE here (keep the leading & trailing slash).
      - run: npm run build:web
        env:
          VITE_BASE: /STS_2_stats/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
        # Latest majors of checkout/setup-node run natively on Node 24.
        # upload-pages-artifact@v3 / deploy-pages@v4 are the current Pages actions.
